# .github/workflows/scanner.yml
name: Run Scanner Script

on:
  workflow_dispatch:
    inputs:
      template_mode:
        description: '爆破模式 (1-8)'
        required: true
        default: '1'
        type: choice
        options:
          - '1' # XUI
          - '2' # 哪吒
          - '3' # HUI
          - '4' # 咸蛋
          - '5' # SUI
          - '6' # SSH
          - '7' # Sub Store
          - '8' # OpenWrt/iStoreOS
      input_file_url:
        description: '源文件下载地址 (例如 1.txt)'
        required: true
        default: 'https://example.com/path/to/1.txt'
      lines_per_file:
        description: '每个小文件行数'
        required: true
        default: '5000'
      semaphore_size:
        description: '爆破线程数'
        required: true
        default: '250'
      use_custom_dict:
        description: '是否使用自定义字典'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      username_dict_url:
        description: '【可选】用户名字典URL (当使用自定义字典时)'
        required: false
        default: ''
      password_dict_url:
        description: '【可选】密码字典URL (当使用自定义字典时)'
        required: false
        default: ''
      install_backdoor:
        description: '是否安装后门 (仅模式6有效)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download input file
        run: |
          curl -L -o 1.txt "${{ github.event.inputs.input_file_url }}"
          echo "源文件下载完成。"

      - name: Download custom dictionaries
        if: github.event.inputs.use_custom_dict == 'true'
        run: |
          if [[ -n "${{ github.event.inputs.username_dict_url }}" ]]; then
            echo "正在下载用户名字典..."
            curl -L -o username.txt "${{ github.event.inputs.username_dict_url }}"
            echo "用户名字典下载完成。"
          else
            echo "⚠️ 未提供用户名字典URL，将检查仓库中是否存在 username.txt。"
          fi
          
          if [[ -n "${{ github.event.inputs.password_dict_url }}" ]]; then
            echo "正在下载密码字典..."
            curl -L -o password.txt "${{ github.event.inputs.password_dict_url }}"
            echo "密码字典下载完成。"
          else
            echo "⚠️ 未提供密码字典URL，将检查仓库中是否存在 password.txt。"
          fi

      - name: Run Python script
        env:
          TEMPLATE_MODE: ${{ github.event.inputs.template_mode }}
          INPUT_FILE: "1.txt"
          LINES_PER_FILE: ${{ github.event.inputs.lines_per_file }}
          SEMAPHORE_SIZE: ${{ github.event.inputs.semaphore_size }}
          USE_CUSTOM_DICT: ${{ github.event.inputs.use_custom_dict }}
          INSTALL_BACKDOOR: ${{ github.event.inputs.install_backdoor }}
          
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          
        run: python main.py
