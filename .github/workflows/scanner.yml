          USERNAME_DICT_URL: ${{ github.event.inputs.username_dict_url }}
          PASSWORD_DICT_URL: ${{ github.event.inputs.password_dict_url }}
          INSTALL_BACKDOOR: ${{ github.event.inputs.install_backdoor }}
        run: python main.py

